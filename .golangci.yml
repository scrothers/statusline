version: "2"

linters:
  default: standard
  enable:
    - gochecknoinits
    - revive
    - errorlint
    - nilnil
    - nilerr
    - usestdlibvars
    - intrange
    - prealloc
    - bodyclose
    - containedctx
    - fatcontext
    - contextcheck
    - unconvert
    - wastedassign
    - misspell
    - unparam
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - gocyclo
          - unparam

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
